server {
	listen 5173;
	# The container is published through the HTTPS reverse proxy. Keep any
	# nginx-generated redirects relative so the internal http://:5173 address
	# never leaks to visitors.
	absolute_redirect off;
	port_in_redirect off;

	# The current site does not use PHP. Return "Gone" for legacy and malformed
	# PHP URLs so search engines remove them from their indexes.
	location ~* \.php(?:/|$) {
		return 410;
	}

	location / {
		root /usr/share/nginx/html;
		index index.html index.htm;
		# Check a prerendered route's index before the directory itself. If nginx
		# matches the directory first, it redirects /privacy to /privacy/ using
		# the container's internal scheme and port.
		# Every public route is prerendered during the build. Unknown URLs must
		# return a real 404 instead of the home page (a search-engine "soft 404").
		try_files $uri/index.html $uri =404;
	}
	include /etc/nginx/extra-conf.d/*.conf;
}
