networks:
  dev:

services:
  nginx:
    image: nginx:stable-alpine
    pull_policy: never
    restart: unless-stopped
    profiles:
      - docker-nginx
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "${NGINX_CONF:-./nginx.conf}:/etc/nginx/nginx.conf:ro"
      - "./certbot/www:/var/www/certbot:ro"
      - "/etc/letsencrypt:/etc/letsencrypt:ro"
    depends_on:
      - frontend
      - tg_bot
    networks:
      - dev

  frontend:
    build:
      context: ./front
    restart: unless-stopped
    ports:
      - "127.0.0.1:5173:5173"
    expose:
      - "5173"
    networks:
      - dev
    depends_on:
      - tg_bot

  tg_bot:
    build:
      context: ./tg_bot
    container_name: tg_bot
    restart: unless-stopped
    network_mode: host
    environment:
      - PORT=3001
      - SMTP_HOST=${SMTP_HOST:-smtp.mail.ru}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_SECURE=${SMTP_SECURE:-true}
      - SMTP_FAMILY=${SMTP_FAMILY:-4}
      - SMTP_USER=${SMTP_USER:-application@e-systems.su}
      - SMTP_PASS=${SMTP_PASS:-}
      - EMAIL_FROM=${EMAIL_FROM:-Энергосистемы <application@e-systems.su>}
      - EMAIL_TO=${EMAIL_TO:-sales@e-systems.su}
      - EMAIL_CC=${EMAIL_CC:-inbox@e-systems.su}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://e-systems.su}

  certbot:
    image: certbot/certbot:latest
    pull_policy: never
    profiles:
      - certbot
    volumes:
      - "./certbot/www:/var/www/certbot"
      - "/etc/letsencrypt:/etc/letsencrypt"
    networks:
      - dev
  # volumes:
  #   postgres_data:
  #   grafana-storage:
