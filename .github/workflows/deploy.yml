name: Docker Compose CI/CD

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Клонирование репозитория
        uses: actions/checkout@v4

      - name: 🔐 Создание .env из секрета DOTENV
        env:
          DOTENV: ${{ secrets.DOTENV }}
        run: |
          if [ -z "$DOTENV" ]; then
            echo "❌ GitHub secret DOTENV is empty or missing"
            exit 1
          fi

          printf '%s\n' "$DOTENV" > .env
          chmod 600 .env

      - name: 🧹 Очистка старой папки на сервере
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            sudo rm -rf /home/${{ secrets.SERVER_USER }}/app
            mkdir -p /home/${{ secrets.SERVER_USER }}/app
            sudo chown -R ${{ secrets.SERVER_USER }}:${{ secrets.SERVER_USER }} /home/${{ secrets.SERVER_USER }}/app

      - name: 🚀 Деплой на сервер по SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: "." # Что копируем (всё содержимое репо)
          target: "/home/${{ secrets.SERVER_USER }}/app" # Куда копируем
          overwrite: true
          strip_components: 0

      - name: 🏃‍♂️ Перезапуск сервиса на сервере
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd /home/${{ secrets.SERVER_USER }}/app

            # Проверка структуры перед запуском
            echo "Проверка структуры файлов:"
            ls -la
            echo ""
            echo "Проверка .env:"
            if [ -s .env ]; then
              echo "✅ .env создан из GitHub secret DOTENV"
            else
              echo "❌ .env не найден или пустой"
              exit 1
            fi
            echo ""
            echo "Проверка front/:"
            ls -la front/ || echo "⚠️ Папка front не найдена"
            echo ""
            echo "Проверка front/Dockerfile:"
            if [ -f front/Dockerfile ]; then
              echo "✅ front/Dockerfile найден"
            else
              echo "❌ front/Dockerfile НЕ найден!"
              echo "Содержимое front/:"
              ls -la front/ 2>/dev/null || echo "Папка front не существует"
              exit 1
            fi
            echo ""

            echo "Проверка endpoint заявок:"
            if grep -R "/api/telegram/lead" -n front/components front/src/components tg_bot/src; then
              echo "❌ Найден старый endpoint /api/telegram/lead"
              exit 1
            fi
            if grep -R "/api/lead" -n front/components front/src/components tg_bot/src >/dev/null; then
              echo "✅ Используется новый endpoint /api/lead"
            else
              echo "❌ Endpoint /api/lead не найден"
              exit 1
            fi
            echo ""

            sudo docker compose down --remove-orphans
            timeout 300s sudo docker compose build --no-cache frontend tg_bot
            sudo docker compose up -d --force-recreate --remove-orphans
            sleep 10 # Ожидание запуска контейнеров

            echo ""
            echo "=== Статус контейнеров ==="
            sudo docker compose ps

            echo ""
            echo "=== Проверка API ==="
            curl -f -i http://127.0.0.1/api/health -H 'Host: e-systems.su'
